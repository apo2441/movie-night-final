<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🕷 Movie Night Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root {
    --red: #c0392b; --green: #27ae60; --gold: #f0c040;
    --black: #0a0a0a; --dark: #111; --card: #181818;
    --border: #2a2a2a; --text: #e8e8e8; --muted: #777;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background: var(--black); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; }

  header {
    background: var(--card); border-bottom: 2px solid var(--red);
    padding: 16px 20px; display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header span { font-size: 12px; color: var(--muted); }
  .counter-badge {
    margin-left: auto; background: var(--red); color: #fff;
    padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 700;
  }

  .config-bar {
    background: #0f0f0f; border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .config-bar label { font-size: 12px; color: var(--muted); }
  .config-bar input {
    flex: 1; min-width: 200px; padding: 8px 12px;
    background: var(--dark); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 13px;
  }
  .config-bar input:focus { outline: none; border-color: var(--red); }
  .save-btn {
    padding: 8px 16px; background: var(--red); border: none;
    border-radius: 8px; color: #fff; font-size: 13px; cursor: pointer;
  }

  .main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 100px); }
  @media (max-width: 700px) { .main { grid-template-columns: 1fr; height: auto; } }

  /* Scanner panel */
  .scanner-panel { padding: 20px; border-right: 1px solid var(--border); }
  .scanner-panel h2 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

  #qr-reader { border-radius: 12px; overflow: hidden; }
  #qr-reader video { border-radius: 12px; }

  .manual-section { margin-top: 16px; }
  .manual-section label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 6px; }
  .manual-row { display: flex; gap: 8px; }
  .manual-row input {
    flex: 1; padding: 10px 14px; background: var(--dark);
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 14px; font-family: monospace;
  }
  .manual-row input:focus { outline: none; border-color: var(--red); }
  .lookup-btn {
    padding: 10px 18px; background: var(--red); border: none;
    border-radius: 8px; color: #fff; font-size: 14px; cursor: pointer;
    font-weight: 600; white-space: nowrap;
  }

  /* Result panel */
  .result-panel { padding: 20px; overflow-y: auto; }
  .result-panel h2 { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }

  .result-card {
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
    border: 1px solid var(--border); display: none;
  }
  .result-card.show { display: block; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

  .result-card.success { border-color: var(--green); background: rgba(39,174,96,0.08); }
  .result-card.warning { border-color: var(--gold); background: rgba(240,192,64,0.08); }
  .result-card.error   { border-color: var(--red); background: rgba(192,57,43,0.08); }

  .result-status {
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 700; margin-bottom: 12px;
  }
  .success .result-status { color: var(--green); }
  .warning .result-status { color: var(--gold); }
  .error   .result-status { color: var(--red); }

  .result-name { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .result-detail { font-size: 13px; color: var(--muted); margin-bottom: 3px; }
  .result-uid { font-family: monospace; font-size: 11px; color: #555; margin-top: 8px; }

  .action-row { display: flex; gap: 8px; margin-top: 16px; }
  .confirm-btn {
    flex: 1; padding: 12px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
  }
  .confirm-btn:hover { opacity: 0.85; }
  .confirm-btn.admit { background: var(--green); color: #fff; }
  .confirm-btn.deny  { background: #333; color: var(--muted); }

  /* Log */
  .log-section { margin-top: 16px; }
  .log-section h3 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .log-list { display: flex; flex-direction: column; gap: 6px; max-height: 300px; overflow-y: auto; }
  .log-item {
    padding: 10px 14px; border-radius: 8px; background: var(--dark);
    border-left: 3px solid; font-size: 13px; display: flex; justify-content: space-between;
  }
  .log-item.ok   { border-color: var(--green); }
  .log-item.dup  { border-color: var(--gold); }
  .log-item.nf   { border-color: var(--red); }
  .log-item-name { font-weight: 600; }
  .log-item-time { color: var(--muted); font-size: 11px; }

  .empty-state {
    text-align: center; padding: 40px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  .export-btn {
    width: 100%; margin-top: 12px; padding: 10px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .export-btn:hover { border-color: var(--green); color: var(--green); }
</style>
</head>
<body>

<header>
  <div>
    <h1>🕷 Movie Night Scanner</h1>
    <span>Scan QR codes to register attendance</span>
  </div>
  <div class="counter-badge">✓ <span id="admitCount">0</span></div>
</header>

<div class="config-bar">
  <label>GitHub Token:</label>
  <input type="text" id="scriptUrl" placeholder="Paste GitHub Token here..." />
  <button class="save-btn" onclick="saveUrl()">Save</button>
</div>

<div class="main">
  <div class="scanner-panel">
    <h2>📷 QR Scanner</h2>
    <div id="qr-reader"></div>

    <div class="manual-section">
      <label>Or enter UID manually:</label>
      <div class="manual-row">
        <input type="text" id="manualUid" placeholder="MN-XXXXXXX-XXXX" onkeydown="if(event.key==='Enter')lookupManual()"/>
        <button class="lookup-btn" onclick="lookupManual()">Lookup</button>
      </div>
    </div>
  </div>

  <div class="result-panel">
    <h2>📋 Result</h2>

    <div id="resultCard" class="result-card">
      <div class="result-status" id="resultStatus"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-detail" id="resultUni"></div>
      <div class="result-detail" id="resultStudentId"></div>
      <div class="result-detail" id="resultPhone"></div>
      <div class="result-uid" id="resultUid"></div>
      <div class="action-row" id="actionRow" style="display:none">
        <button class="confirm-btn admit" onclick="markAttendance()">✓ Admit</button>
        <button class="confirm-btn deny" onclick="clearResult()">✗ Skip</button>
      </div>
    </div>

    <div id="emptyState" class="empty-state">
      <div class="icon">🎬</div>
      <div>Scan a QR code to see<br/>registration details</div>
    </div>

    <div class="log-section">
      <h3>📝 Attendance Log (<span id="logCount">0</span>)</h3>
      <div class="log-list" id="logList"></div>
      <button class="export-btn" onclick="exportCSV()">⬇ Export CSV</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const REPO_OWNER = 'YOUR_GITHUB_USERNAME_HERE'; // e.g., 'abdullah'
const REPO_NAME = 'YOUR_REPO_NAME_HERE';      // e.g., 'movie-night-db'
// ──────────────────────────────────────────────────────────────────────────────

let GITHUB_TOKEN = localStorage.getItem('github_token') || '';
let currentFileSha = '';

let pendingPerson = null;
let log = JSON.parse(localStorage.getItem('scanner_log') || '[]');
let admitCount = parseInt(localStorage.getItem('scanner_admit') || '0');
let scanning = false;

document.getElementById('scriptUrl').value = GITHUB_TOKEN;
renderLog();
document.getElementById('admitCount').textContent = admitCount;

function saveUrl() {
  GITHUB_TOKEN = document.getElementById('scriptUrl').value.trim();
  localStorage.setItem('github_token', GITHUB_TOKEN);
  alert('Token saved!');
}

// ── QR Scanner ───────────────────────────────────────────────────────────────
const html5QrcodeScanner = new Html5QrcodeScanner('qr-reader', {
  fps: 10, qrbox: { width: 250, height: 250 },
  rememberLastUsedCamera: true,
});

html5QrcodeScanner.render(onScanSuccess, onScanError);

function onScanSuccess(decodedText) {
  if (scanning) return;
  scanning = true;
  lookupUID(decodedText.trim());
  setTimeout(() => { scanning = false; }, 3000); // Cooldown
}
function onScanError() {} // Silence errors

// ── Lookup ───────────────────────────────────────────────────────────────────
function lookupManual() {
  const uid = document.getElementById('manualUid').value.trim();
  if (!uid) return;
  lookupUID(uid);
}

async function lookupUID(uid) {
  if (!GITHUB_TOKEN) { alert('Please enter your GitHub Token first!'); return; }

  showResult('loading', 'Looking up...', '', '', '', uid);

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data/${uid}.json`, {
      headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
    });

    if (res.ok) {
      const fileData = await res.json();
      currentFileSha = fileData.sha;
      
      const data = JSON.parse(decodeURIComponent(escape(atob(fileData.content))));
      pendingPerson = data;

      if (data.admitted) {
        const t = new Date(data.scannedAt).toLocaleTimeString();
        showResult('warning', `⚠ Already Admitted`, `${data.firstName} ${data.lastName}`, data.university, `Student ID: ${data.studentId}`, uid, `Already scanned at ${t}`, false);
        logEntry(uid, data.firstName + ' ' + data.lastName, 'dup');
      } else {
        showResult('success', '✓ Valid Registration', `${data.firstName} ${data.lastName}`, data.university, `Student ID: ${data.studentId}`, uid, `Phone: ${data.phone}`, true);
      }
    } else if (res.status === 404) {
      showResult('error', '✗ Not Found', 'Unknown QR Code', '', 'This UID is not in the system', uid, '', false);
      logEntry(uid, 'Unknown', 'nf');
    } else {
      throw new Error('API Error');
    }
  } catch(err) {
    showResult('error', '✗ Network Error', 'Cannot reach server', '', 'Check your connection or token', uid, '', false);
  }
}

function showResult(type, status, name, uni, detail, uid, extra, showActions) {
  const card = document.getElementById('resultCard');
  const empty = document.getElementById('emptyState');
  card.className = 'result-card show ' + (type === 'loading' ? '' : type === 'success' ? 'success' : type === 'warning' ? 'warning' : 'error');
  document.getElementById('resultStatus').textContent = status;
  document.getElementById('resultName').textContent = name;
  document.getElementById('resultUni').textContent = uni;
  document.getElementById('resultStudentId').textContent = detail;
  document.getElementById('resultPhone').textContent = extra || '';
  document.getElementById('resultUid').textContent = uid;
  document.getElementById('actionRow').style.display = showActions ? 'flex' : 'none';
  empty.style.display = 'none';
}

async function markAttendance() {
  if (!pendingPerson) return;
  document.getElementById('actionRow').style.display = 'none';

  pendingPerson.admitted = true;
  pendingPerson.scannedAt = new Date().toISOString();
  
  const base64Content = btoa(unescape(encodeURIComponent(JSON.stringify(pendingPerson))));

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data/${pendingPerson.uid}.json`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${GITHUB_TOKEN}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: `Admitted: ${pendingPerson.firstName} ${pendingPerson.lastName}`,
        content: base64Content,
        sha: currentFileSha
      })
    });

    if (res.ok) {
      admitCount++;
      localStorage.setItem('scanner_admit', admitCount);
      document.getElementById('admitCount').textContent = admitCount;
      logEntry(pendingPerson.uid, pendingPerson.firstName + ' ' + pendingPerson.lastName, 'ok');

      document.getElementById('resultStatus').textContent = '✓ Admitted!';
      document.getElementById('resultCard').className = 'result-card show success';
      setTimeout(clearResult, 2000);
    } else {
      throw new Error("Failed to update GitHub");
    }
  } catch(err) {
    alert("Error saving attendance to GitHub. Please try again.");
    document.getElementById('actionRow').style.display = 'flex';
  }
  
  pendingPerson = null;
}

function clearResult() {
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('emptyState').style.display = 'block';
  pendingPerson = null;
}

// ── Log ──────────────────────────────────────────────────────────────────────
function logEntry(uid, name, type) {
  const entry = { uid, name, type, time: new Date().toLocaleTimeString() };
  log.unshift(entry);
  if (log.length > 200) log.pop();
  localStorage.setItem('scanner_log', JSON.stringify(log));
  renderLog();
}

function renderLog() {
  const list = document.getElementById('logList');
  document.getElementById('logCount').textContent = log.filter(l => l.type === 'ok').length;

  if (log.length === 0) { list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:8px">No scans yet</div>'; return; }

  list.innerHTML = log.map(e => `
    <div class="log-item ${e.type}">
      <div>
        <div class="log-item-name">${e.name}</div>
        <div style="font-size:11px;color:var(--muted)">${e.uid}</div>
      </div>
      <div style="text-align:right">
        <div class="log-item-time">${e.time}</div>
        <div style="font-size:11px;color:var(--muted)">${e.type === 'ok' ? '✓ admitted' : e.type === 'dup' ? '⚠ dup' : '✗ unknown'}</div>
      </div>
    </div>
  `).join('');
}

function exportCSV() {
  const rows = [['UID','Name','Status','Time']];
  log.forEach(e => rows.push([e.uid, e.name, e.type === 'ok' ? 'Admitted' : e.type === 'dup' ? 'Duplicate' : 'Not Found', e.time]));
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'movie-night-attendance.csv'; a.click();
}
</script>
</body>
</html>
